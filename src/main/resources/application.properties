spring.application.name=maodien

# Database Configuration (common settings)
spring.jpa.hibernate.ddl-auto=update

# Redis Configuration (common settings)
spring.data.redis.timeout=2000ms
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.password=${REDIS_PASSWORD}

# OAuth2 Configuration (common across all environments)
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_OAUTH2_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_OAUTH2_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri=${GOOGLE_OAUTH2_REDIRECT_URI}

# JWT Configuration (common across all environments)
jwt.secret=${JWT_SECRET}
jwt.access-token-expiration=${JWT_ACCESS_TOKEN_EXPIRATION}
jwt.refresh-token-expiration=900000000

# Server Configuration (common)
server.port=${SERVER_PORT:8083}

# Frontend Configuration (for OAuth2 redirects)
app.frontend.url=${FRONTEND_URL}
app.oauth.success-redirect-path=${OAUTH_SUCCESS_REDIRECT_PATH}

# Security Configuration
app.security.rbac.enabled=${RBAC_ENABLED:false}

# Public Endpoints Configuration (comma-separated list)
app.security.public-endpoints=/api/v1/auth/register,/api/v1/auth/login,/api/v1/auth/refresh,/api/v1/auth/oauth2/**,/api/public/**,/swagger-ui/**,/v3/api-docs/**,/swagger-ui.html,/actuator/health,/error,/api/audit-demo/**,/api/test/**

# Audit Logging Configuration
app.audit.enabled=${AUDIT_ENABLED:true}
app.audit.log-parameters=${AUDIT_LOG_PARAMETERS:false}
app.audit.log-response=${AUDIT_LOG_RESPONSE:false}
app.audit.log-only-success=${AUDIT_LOG_ONLY_SUCCESS:false}
app.audit.max-value-length=${AUDIT_MAX_VALUE_LENGTH:10000}
app.audit.async-logging=${AUDIT_ASYNC_LOGGING:true}
app.audit.retention-days=${AUDIT_RETENTION_DAYS:365}
app.audit.compress-old-logs=${AUDIT_COMPRESS_OLD_LOGS:true}

# Enable scheduling for token cleanup
spring.task.scheduling.pool.size=2

# Cache Configuration
spring.cache.type=redis

# Rate Limiting Configuration
app.rate-limit.enabled=${RATE_LIMIT_ENABLED:true}
app.rate-limit.default-requests-per-minute=${RATE_LIMIT_DEFAULT_REQUESTS_PER_MINUTE:100}
app.rate-limit.login-requests-per-minute=${RATE_LIMIT_LOGIN_REQUESTS_PER_MINUTE:10}
app.rate-limit.register-requests-per-minute=${RATE_LIMIT_REGISTER_REQUESTS_PER_MINUTE:5}
app.rate-limit.refresh-token-requests-per-minute=${RATE_LIMIT_REFRESH_TOKEN_REQUESTS_PER_MINUTE:30}
app.rate-limit.anonymous-requests-per-minute=${RATE_LIMIT_ANONYMOUS_REQUESTS_PER_MINUTE:50}
app.rate-limit.ban-duration-minutes=${RATE_LIMIT_BAN_DURATION_MINUTES:15}
app.rate-limit.max-violations-before-ban=${RATE_LIMIT_MAX_VIOLATIONS_BEFORE_BAN:5}

# Face Recognition API (internal Python service)
face-api.base-url=${FACE_API_BASE_URL:http://localhost:8000}

# Multipart File Upload Configuration
spring.servlet.multipart.max-file-size=${MULTIPART_MAX_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=${MULTIPART_MAX_REQUEST_SIZE:10MB}

# Jackson Configuration for proper date/time serialization
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.serialization.write-date-timestamps-as-nanoseconds=false
spring.jackson.deserialization.read-date-timestamps-as-nanoseconds=false
spring.jackson.time-zone=UTC
# Explicitly disable JSR310 default behavior and force proper module registration
spring.jackson.default-property-inclusion=non_null

# Swagger/OpenAPI Configuration (common across all environments)
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.swagger-ui.defaultModelsExpandDepth=-1
springdoc.swagger-ui.docExpansion=none
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.show-actuator=false

# Spring Boot Actuator Configuration
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=when-authorized
management.health.defaults.enabled=true

app.security.encryption.key-base64=${APP_ENCRYPTION_KEY_BASE64:}