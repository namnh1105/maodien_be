# Test Environment Configuration

# In-memory H2 Database for testing
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate Configuration for tests
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Override environment variables with test values
REDIS_HOST=localhost
REDIS_PORT=6379
REDIS_PASSWORD=
GOOGLE_OAUTH2_CLIENT_ID=test-client-id
GOOGLE_OAUTH2_CLIENT_SECRET=test-client-secret
GOOGLE_OAUTH2_REDIRECT_URI=http://localhost:8080/login/oauth2/code/google
JWT_SECRET=test-secret-key-for-jwt-tokens-this-is-a-very-long-secret-key-for-testing-purposes-only-needs-to-be-at-least-32-characters
JWT_ACCESS_TOKEN_EXPIRATION=3600000
JWT_REFRESH_TOKEN_EXPIRATION=86400000
SERVER_PORT=0
FRONTEND_URL=http://localhost:3000
OAUTH_SUCCESS_REDIRECT_PATH=/oauth/success
RBAC_ENABLED=true

# Redis Configuration for tests
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=1000ms
spring.data.redis.password=

# OAuth2 Configuration for tests
spring.security.oauth2.client.registration.google.client-id=test-client-id
spring.security.oauth2.client.registration.google.client-secret=test-client-secret
spring.security.oauth2.client.registration.google.redirect-uri=http://localhost:8080/login/oauth2/code/google

# JWT Configuration for tests
jwt.secret=test-secret-key-for-jwt-tokens-this-is-a-very-long-secret-key-for-testing-purposes-only-needs-to-be-at-least-32-characters
jwt.access-token-expiration=3600000
jwt.refresh-token-expiration=86400000

# Server Configuration for tests
server.port=0

# Frontend Configuration for tests
app.frontend.url=http://localhost:3000
app.oauth.success-redirect-path=/oauth/success

# RBAC Configuration for tests
app.security.rbac.enabled=true

# Rate limiting disabled for tests
app.rate-limit.enabled=false

# Audit configuration for tests
app.audit.enabled=false
app.audit.log-parameters=false
app.audit.log-response=false

# Logging Configuration for tests
logging.level.root=WARN
logging.level.com.hainam.worksphere=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.orm.jdbc.bind=WARN

# Cache configuration for tests
spring.cache.type=simple

# Jackson configuration for tests
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.serialization.write-date-timestamps-as-nanoseconds=false
spring.jackson.deserialization.read-date-timestamps-as-nanoseconds=false
spring.jackson.date-format=yyyy-MM-dd'T'HH:mm:ss.SSS
spring.jackson.time-zone=Asia/Ho_Chi_Minh
spring.jackson.default-property-inclusion=non_null

# Disable Swagger for tests
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

